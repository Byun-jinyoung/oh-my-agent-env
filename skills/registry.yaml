# oh-my-agent-env skill registry
# 새 skill 추가 시 이 파일에 엔트리 추가 → ./setup.sh sync가 자동 처리

paper-analyzer:
  path: skills/paper-analyzer
  runtimes: [codex, antigravity]
  deps:
    python: [pdfplumber, pdf2image]
    system: [poppler]

# Triangle Review — Claude orchestrator only
# (Codex/Antigravity는 ask_codex / call_antigravity.sh로 spawn되므로 skill 등록 불필요)
triangle-review:
  path: skills/triangle-review
  runtimes: [claude]
  deps:
    python: [pyyaml]
    external_mcp: [serena, code-review-graph]   # codex/antigravity config에 자동 등록됨

# Codebase-scan — 3 runtime이 공유하는 evidence baseline
# (claude/codex/antigravity가 같은 L1-facts.md를 보고 리뷰 → false disagreement 차단)
codebase-scan:
  path: skills/codebase-scan
  runtimes: [claude, codex, antigravity]
  deps:
    python: [code-review-graph]
    external_mcp: [serena, code-review-graph]

# Graphify — managed by the graphify CLI itself, NOT by oh-my-agent-env.
# `graphify install --platform claude` writes ~/.claude/skills/graphify/SKILL.md
# (real directory, not a symlink). setup.sh's [10] Frameworks step invokes it
# after `uv tool install graphifyy`. ~/.agents/skills/graphify is then created
# as a symlink to ~/.claude/skills/graphify so codex/antigravity share the same
# SKILL. Reason: each machine's graphifyy package version differs, so a
# repo-level SKILL.md cannot be the source of truth — the CLI is.

# Shared agent skills — code-project workflow.
# runtime `agents` -> ~/.agents/skills, which BOTH codex and antigravity scan.
# Do NOT also list codex/antigravity here: those add ~/.codex/skills and
# ~/.gemini/skills links (antigravity inherits the gemini-cli dir), which the
# same CLIs double-load -> skill conflict.
# slurm-hpc reads skills/slurm-hpc/references/cluster.generated.md when present
# (generated per-machine by scripts/generate-slurm-skill.sh, gitignored).
slurm-hpc:
  path: skills/slurm-hpc
  runtimes: [claude, agents]

spec-interview:
  path: skills/spec-interview
  runtimes: [claude, agents]

git-cli-workflow:
  path: skills/git-cli-workflow
  runtimes: [claude, agents]

multi-agent-review:
  path: skills/multi-agent-review
  runtimes: [claude, agents]
